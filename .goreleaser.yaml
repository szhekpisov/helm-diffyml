version: 2

project_name: helm-diffyml

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/szhekpisov/helm-diffyml/internal/build.Version={{.Version}}
      - -X github.com/szhekpisov/helm-diffyml/internal/build.Commit={{.Commit}}
      - -X github.com/szhekpisov/helm-diffyml/internal/build.Date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - plugin.yaml

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.spdx.json"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: checksum
  - id: sboms
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: sbom

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: "^feat"
      order: 1
    - title: Fixes
      regexp: "^(fix|bug)"
      order: 2
    - title: Documentation
      regexp: "^(doc|docs|readme)"
      order: 3
    - title: Other
      order: 99
  filters:
    exclude:
      - "^test:"
      - "^chore:"

release:
  draft: true
  name_template: "v{{.Version}}"

snapshot:
  version_template: "{{ .Tag }}-next"
